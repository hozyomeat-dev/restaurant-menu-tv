name: Validate Menu

on:
  pull_request:
    paths:
      - "data/menus.json"
      - "scripts/validate-menu.ts"
      - "lib/menu.ts"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run validate
      - run: npm run build
